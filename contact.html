<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact • Watson HVAC Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="font-sans bg-slate-50">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-[#003087] rounded-2xl flex items-center justify-center text-white text-3xl">❄️</div>
                <div>
                    <h1 class="text-2xl font-bold text-[#003087]">Watson HVAC</h1>
                    <p class="text-xs tracking-widest text-slate-500 -mt-1">SOLUTIONS</p>
                </div>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="index.html" class="hover:text-[#003087]">Home</a>
                <a href="about.html" class="hover:text-[#003087]">About</a>
                <a href="services.html" class="hover:text-[#003087]">Services</a>
                <a href="pricing.html" class="hover:text-[#003087]">Pricing</a>
                <a href="gallery.html" class="hover:text-[#003087]">Our Work</a>
                <a href="contact.html" class="font-semibold text-[#003087]">Contact</a>
            </div>
            <a href="tel:6135586836" class="flex items-center bg-emerald-600 text-white px-6 py-3 rounded-3xl font-semibold">
                <i class="fa-solid fa-phone mr-2"></i> (613) 558-6836
            </a>
        </div>
    </nav>

    <section class="py-20">
        <div class="max-w-3xl mx-auto px-6">
            <div class="text-center mb-12">
                <h1 class="text-5xl font-bold text-[#003087] mb-4">Get in Touch</h1>
                <p class="text-slate-600 text-lg">Fill out the form below and we'll get back to you shortly.</p>
            </div>

            <form action="https://formspree.io/f/xvgzlowq" method="POST" class="bg-white p-8 rounded-3xl shadow-md space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold mb-2">First Name</label>
                        <input type="text" name="first_name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#003087] outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">Last Name</label>
                        <input type="text" name="last_name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#003087] outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#003087] outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">Message</label>
                    <textarea name="message" rows="5" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#003087] outline-none" placeholder="How can we help you?"></textarea>
                </div>

                <button type="submit" class="w-full bg-[#003087] text-white font-bold py-4 rounded-xl hover:bg-blue-800 transition shadow-lg">
                    Send Message to Watson HVAC
                </button>
            </form>
        </div>
    </section>

    <footer class="bg-slate-900 text-white py-12">
        <div class="max-w-screen-2xl mx-auto px-6 text-center">
            <p class="text-xl font-semibold">Watson HVAC Solutions</p>
            <p class="mt-2 opacity-70">Renfrew County, Ontario • Authorized Cinderella Dealer</p>
            <p class="mt-1 opacity-70">(613) 558-6836 • watsonhvacsolutions@gmail.com</p>
        </div>
    </footer>

</body>
</html>
